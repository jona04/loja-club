services:

  # Dev services are exposed on the Loja Club host ports below. With
  # DOMAIN=localhost and Traefik they are also reachable at
  # api./app./admin.<DOMAIN> (routing wired up in later phases).
  proxy:
    image: traefik:3.6
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8088:80"
      - "8091:8080"
    # Duplicate the command from compose.yml to add --api.insecure=true
    command:
      # Enable Docker in Traefik, so that it reads labels from Docker services
      - --providers.docker
      # Add a constraint to only use services with the label for this stack
      - --providers.docker.constraints=Label(`traefik.constraint-label`, `traefik-public`)
      # Do not expose all Docker services, only the ones explicitly exposed
      - --providers.docker.exposedbydefault=false
      # Create an entrypoint "http" listening on port 80
      - --entrypoints.http.address=:80
      # Create an entrypoint "https" listening on port 443
      - --entrypoints.https.address=:443
      # Enable the access log, with HTTP requests
      - --accesslog
      # Enable the Traefik log, for configurations and errors
      - --log
      # Enable debug logging for local development
      - --log.level=DEBUG
      # Enable the Dashboard and API
      - --api
      # Enable the Dashboard and API in insecure mode for local development
      - --api.insecure=true
    labels:
      # Enable Traefik for this service, to make it available in the public network
      - traefik.enable=true
      - traefik.constraint-label=traefik-public
      # Dummy https-redirect middleware that doesn't really redirect, only to
      # allow running it locally
      - traefik.http.middlewares.https-redirect.contenttype.autodetect=false
    networks:
      - traefik-public
      - default

  db:
    restart: "no"
    ports:
      - "5442:5432"

  redis:
    restart: "no"
    ports:
      - "6399:6379"

  adminer:
    restart: "no"
    ports:
      - "8810:8080"

  backend:
    restart: "no"
    ports:
      - "8800:8000"
    build:
      context: .
      dockerfile: backend/Dockerfile
    # command: sleep infinity  # Infinite loop to keep container alive doing nothing
    command:
      - fastapi
      - run
      - --reload
      - "app/main.py"
    develop:
      watch:
        - path: ./backend
          action: sync
          target: /app/backend
          ignore:
            - ./backend/.venv
            - .venv
        - path: ./backend/pyproject.toml
          action: rebuild
    # TODO: remove once coverage is done locally
    volumes:
      - ./backend/htmlcov:/app/backend/htmlcov
    environment:
      SMTP_HOST: "mailcatcher"
      SMTP_PORT: "1025"
      SMTP_TLS: "false"
      EMAILS_FROM_EMAIL: "noreply@example.com"

  worker:
    # Dev: deliver enqueued emails to Mailcatcher (plain SMTP on 1025, no TLS).
    # Without this the worker inherits the prod-like .env (587 + TLS) and the
    # send fails silently against Mailcatcher.
    environment:
      SMTP_HOST: "mailcatcher"
      SMTP_PORT: "1025"
      SMTP_TLS: "false"
      EMAILS_FROM_EMAIL: "noreply@example.com"

  mailcatcher:
    image: schickling/mailcatcher
    ports:
      - "1090:1080"
      - "1035:1025"

  frontend-dashboard:
    restart: "no"
    ports:
      - "5180:80"
    build:
      context: .
      dockerfile: frontend-dashboard/Dockerfile
      args:
        - VITE_API_URL=http://localhost:8800
        - VITE_STOREFRONT_URL=http://localhost:3000
        - NODE_ENV=development

  frontend-admin:
    restart: "no"
    ports:
      - "5181:80"
    build:
      context: .
      dockerfile: frontend-admin/Dockerfile
      args:
        - VITE_API_URL=http://localhost:8800
        - NODE_ENV=development

  frontend-storefront:
    restart: "no"
    ports:
      - "3000:3000"
    build:
      context: .
      dockerfile: frontend-storefront/Dockerfile
      args:
        # SSR runs inside the container → reach the backend on the internal network.
        - NEXT_PUBLIC_API_URL=http://backend:8000

  # e2e runs against a DISPOSABLE database, not the dev one. `db-test` uses tmpfs
  # (in memory): no volume -> nothing to wipe, and impossible to confuse with the
  # dev db's `app-db-data` volume. Never run `docker compose down -v` locally (it
  # would wipe the dev db) -- the tmpfs is already disposable; run e2e via the
  # `ci-local.sh` pipeline.
  db-test:
    image: postgres:18
    restart: "no"
    tmpfs:
      - /var/lib/postgresql/data/pgdata
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_DB=${POSTGRES_DB?Variable not set}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      retries: 10
      timeout: 5s

  prestart-e2e:
    image: '${DOCKER_IMAGE_BACKEND?Variable not set}:${TAG-latest}'
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: "no"
    depends_on:
      db-test:
        condition: service_healthy
    command: bash scripts/prestart.sh
    env_file:
      - .env
    environment:
      - POSTGRES_SERVER=db-test

  backend-e2e:
    image: '${DOCKER_IMAGE_BACKEND?Variable not set}:${TAG-latest}'
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: "no"
    depends_on:
      db-test:
        condition: service_healthy
      prestart-e2e:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    command:
      - fastapi
      - run
      - "app/main.py"
    env_file:
      - .env
    environment:
      - POSTGRES_SERVER=db-test
      - REDIS_HOST=redis
      - SMTP_HOST=mailcatcher
      - SMTP_PORT=1025
      - SMTP_TLS=false
      - EMAILS_FROM_EMAIL=noreply@example.com

  playwright:
    build:
      context: .
      dockerfile: frontend-dashboard/Dockerfile.playwright
      args:
        - VITE_API_URL=http://backend-e2e:8000
        - NODE_ENV=production
    ipc: host
    depends_on:
      - backend-e2e
      - mailcatcher
    env_file:
      - .env
    environment:
      - VITE_API_URL=http://backend-e2e:8000
      - MAILCATCHER_HOST=http://mailcatcher:1080
      # For the reports when run locally
      - PLAYWRIGHT_HTML_HOST=0.0.0.0
      - CI=${CI}
    volumes:
      - ./frontend-dashboard/blob-report:/app/frontend-dashboard/blob-report
      - ./frontend-dashboard/test-results:/app/frontend-dashboard/test-results
    ports:
      - 9323:9323

  playwright-admin:
    build:
      context: .
      dockerfile: frontend-admin/Dockerfile.playwright
      args:
        - VITE_API_URL=http://backend-e2e:8000
        - NODE_ENV=production
    ipc: host
    depends_on:
      - backend-e2e
    env_file:
      - .env
    environment:
      - VITE_API_URL=http://backend-e2e:8000
      - PLAYWRIGHT_HTML_HOST=0.0.0.0
      - CI=${CI}
    volumes:
      - ./frontend-admin/blob-report:/app/frontend-admin/blob-report
      - ./frontend-admin/test-results:/app/frontend-admin/test-results
    ports:
      - 9324:9323

networks:
  traefik-public:
    # For local dev, don't expect an external Traefik network
    external: false
