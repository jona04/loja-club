name: Test Docker Compose

on:
  push:
    branches:
      - development
  pull_request:
    types:
      - opened
      - synchronize

jobs:

  test-docker-compose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create .env from example (CI uses non-secret dev defaults)
        run: cp .env.example .env
      - run: docker compose build
      - run: docker compose down -v --remove-orphans
      - run: docker compose up -d --wait backend frontend-dashboard adminer
      - name: Test backend is up
        run: curl http://localhost:8800/api/v1/utils/health-check
      - name: Test frontend-dashboard is up
        run: curl http://localhost:5180
      - run: docker compose down -v --remove-orphans
